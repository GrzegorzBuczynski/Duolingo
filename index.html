<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MojeLingo Pro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <div id="homeView">
        <div class="header">
            <div class="btn-group">
                <button class="btn" id="btnCourse">Wybierz Kurs</button>
                <button class="btn" id="btnDifficulty">Trudność</button>
            </div>
            <div class="btn-group">
                <button class="btn" id="btnExport">Zapisz</button>
                <button class="btn" id="btnImport">Wczytaj</button>
                <button class="btn danger" id="btnReset">Reset</button>
            </div>
        </div>

        <input type="file" id="importFile" accept=".json" style="display:none">

        <div id="coursePanel" class="panel">
            <div class="course-list" id="courseList"></div>
        </div>

        <div id="diffPanel" class="panel">
            <div style="display:flex; flex-direction:column; gap:10px;">
                <label><input type="checkbox" id="diff_multiple" checked> Wielokrotny wybór</label>
                <label><input type="checkbox" id="diff_word" checked> Bloczki tekstowe</label>
                <label><input type="checkbox" id="diff_typing" checked> Wpisywanie</label>
            </div>
        </div>

        <div class="tree" id="lessonTree"></div>
    </div>

    <div id="quizView" class="hidden">
        <div class="header">
            <button class="btn" id="btnBack">← Wróć</button>
            <h2 id="quizTitle"></h2>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="question" id="questionText"></div>
        <div id="quizContent"></div>
        <div class="feedback hidden" id="feedback"></div>
        <button class="submit" id="submitBtn" disabled>Sprawdź</button>
    </div>
</div>

<!-- Skrypty ładowane w kolejności zależności -->
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/home.js"></script>
<script src="js/quiz.js"></script>
<script src="js/app.js"></script>
</body>
</html>

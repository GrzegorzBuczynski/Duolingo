<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MojeLingo Pro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <!-- Topbar — zawsze widoczny, zawartość zależy od trybu -->
    <div class="topbar">
        <div id="topbarHome" class="topbar-content">
            <button class="tab-btn" id="tab-lessons" title="Lekcje">📖</button>
            <button class="tab-btn" id="tab-courses" title="Wybierz kurs">📚</button>
            <button class="tab-btn" id="tab-difficulty" title="Trudność">🪜</button>
            <button class="tab-btn" id="tab-settings" title="Ustawienia">⚙️</button>
        </div>
        <div id="topbarQuiz" class="topbar-content hidden">
            <button class="btn" id="btnBack">← Wróć</button>
            <h2 id="quizTitle"></h2>
        </div>
    </div>

    <!-- Obszar paneli — współdzielony przez zakładki i quiz -->
    <div id="mainView">
        <input type="file" id="importFile" accept=".json" style="display:none">

        <div id="lessonsPanel" class="panel tab-panel">
            <div class="tree" id="lessonTree"></div>
        </div>

        <div id="coursePanel" class="panel tab-panel">
            <div class="course-list" id="courseList"></div>
        </div>

        <div id="diffPanel" class="panel tab-panel">
            <div style="display:flex; flex-direction:column; gap:10px;">
                <label><input type="checkbox" id="diff_multiple" checked> Wielokrotny wybór</label>
                <label><input type="checkbox" id="diff_word" checked> Bloczki tekstowe</label>
                <label><input type="checkbox" id="diff_typing" checked> Wpisywanie</label>
            </div>
        </div>

        <div id="settingsPanel" class="panel tab-panel">
            <div class="settings-actions">
                <button class="btn" id="btnExport">Zapisz</button>
                <button class="btn" id="btnImport">Wczytaj</button>
                <button class="btn danger" id="btnReset">Reset</button>
            </div>
        </div>

        <div id="quizView" class="panel tab-panel hidden">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="question" id="questionText"></div>
            <div id="quizContent"></div>
            <div class="feedback hidden" id="feedback"></div>
            <button class="submit" id="submitBtn" disabled>Sprawdź</button>
        </div>
    </div>
</div>

<!-- Skrypty ładowane w kolejności zależności -->
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/home.js"></script>
<script src="js/quiz.js"></script>
<script src="js/app.js"></script>
</body>
</html>
